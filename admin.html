<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Club - Painel de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#0a0a0a',
                            active: '#d4af37',
                            bg: '#f4f6f8',
                            blue: '#4c8ee8',
                            red: '#ef4444',
                            green: '#10b981',
                            lightGold: '#fef3c7',
                            darkGold: '#b45309'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .cal-grid { display: grid; grid-template-columns: 50px repeat(6, 1fr); border-top: 1px solid #e5e7eb; border-left: 1px solid #e5e7eb; }
        @media(min-width: 768px) { .cal-grid { grid-template-columns: 60px repeat(6, 1fr); } }
        .cal-cell { border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; height: 70px; position: relative; }
        @media(min-width: 768px) { .cal-cell { height: 80px; } }
        .cal-header { background-color: #ffffff; text-align: center; padding: 8px 0; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-brand-bg">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-brand-dark text-white hidden md:flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <img src="prime_club_barbearia_logo.png" alt="Logo" class="w-10 h-10 rounded-full border border-brand-active">
                <span class="font-bold text-lg tracking-tight">Prime Club</span>
            </div>
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <button onclick="switchTab('dashboard', this)" class="nav-link active flex items-center gap-3 w-full p-3 rounded-lg bg-brand-active text-black font-semibold">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </button>
                <button onclick="switchTab('calendar', this)" class="nav-link flex items-center gap-3 w-full p-3 rounded-lg hover:bg-white/10 transition-colors">
                    <i data-lucide="calendar"></i> Agenda
                </button>
                <button onclick="switchTab('finance', this)" class="nav-link flex items-center gap-3 w-full p-3 rounded-lg hover:bg-white/10 transition-colors">
                    <i data-lucide="dollar-sign"></i> Financeiro
                </button>
                <button onclick="switchTab('blocks', this)" class="nav-link flex items-center gap-3 w-full p-3 rounded-lg hover:bg-white/10 transition-colors">
                    <i data-lucide="shield-alert"></i> Bloqueios
                </button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto flex flex-col">
            <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
                <h2 id="tab-title" class="text-xl font-bold text-gray-800 uppercase tracking-wide">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <button onclick="fetchData()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-brand-active">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <div class="p-4 md:p-8 space-y-8">
                <section id="dashboard" class="tab-content active space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="bg-white p-6 rounded-xl border shadow-sm">
                            <p class="text-xs font-bold text-brand-active uppercase">Hoje</p>
                            <h3 id="stat-today" class="text-3xl font-bold mt-1">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl border shadow-sm">
                            <p class="text-xs font-bold text-brand-blue uppercase">Amanhã</p>
                            <h3 id="stat-tomorrow" class="text-3xl font-bold mt-1">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl border shadow-sm">
                            <p class="text-xs font-bold text-brand-green uppercase">Cancelados</p>
                            <h3 id="stat-canceled" class="text-3xl font-bold mt-1">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl border shadow-sm">
                            <p class="text-xs font-bold text-brand-darkGold uppercase">Bloqueados</p>
                            <h3 id="stat-blocked-nums" class="text-3xl font-bold mt-1">0</h3>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h4 class="font-bold">Agendamentos Recentes</h4>
                            <button onclick="openBookingModal()" class="bg-brand-active text-black px-4 py-2 rounded-lg font-bold text-sm">+ Novo</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider">
                                    <tr>
                                        <th class="px-6 py-4">Data/Hora</th>
                                        <th class="px-6 py-4">Cliente</th>
                                        <th class="px-6 py-4">Serviço</th>
                                        <th class="px-6 py-4">Valor</th>
                                        <th class="px-6 py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-bookings" class="divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="blocks" class="tab-content space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white p-6 rounded-xl border shadow-sm space-y-4">
                            <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="phone-off"></i> Números Restritos (50% Sinal)</h3>
                            <div class="flex gap-2">
                                <input id="new-block-phone" type="text" placeholder="DDD + Número" class="flex-1 p-2 border rounded-lg outline-none focus:ring-2 ring-brand-active">
                                <button onclick="addBlockedPhone()" class="bg-brand-active px-4 py-2 rounded-lg font-bold">Bloquear</button>
                            </div>
                            <div class="max-h-64 overflow-y-auto mt-4">
                                <ul id="blocked-phones-list" class="divide-y text-sm"></ul>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl border shadow-sm space-y-4">
                            <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="calendar-off"></i> Bloqueio de Datas</h3>
                            <div class="grid grid-cols-2 gap-2">
                                <input id="block-date-start" type="date" class="p-2 border rounded-lg outline-none">
                                <input id="block-date-end" type="date" class="p-2 border rounded-lg outline-none">
                            </div>
                            <button onclick="blockDateRange()" class="w-full bg-brand-dark text-white p-3 rounded-lg font-bold hover:bg-gray-800 uppercase">Bloquear Período</button>
                            <div id="blocked-dates-list" class="flex flex-wrap gap-2 mt-4"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="plus-circle" class="text-brand-active"></i> Novo Agendamento</h2>
            <form id="admin-booking-form" class="space-y-4">
                <input required id="book-client" type="text" placeholder="Nome do Cliente" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-brand-active">
                <input required id="book-phone" type="tel" placeholder="WhatsApp (DDD + Número)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-brand-active">
                <div class="grid grid-cols-2 gap-3">
                    <input required id="book-date" type="date" class="p-3 border rounded-xl outline-none">
                    <input required id="book-time" type="time" class="p-3 border rounded-xl outline-none">
                </div>
                <select id="book-service" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-brand-active">
                    <option value="Cabelo|35">Cabelo (R$ 35)</option>
                    <option value="Barba|35">Barba (R$ 35)</option>
                    <option value="Combo|60">Combo (R$ 60)</option>
                </select>
                <div id="deposit-warning" class="hidden p-3 bg-brand-lightGold text-brand-darkGold border border-brand-active rounded-xl text-sm font-medium animate-pulse">
                    ⚠️ Atenção: Este número requer depósito de 50% para confirmação!
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeBookingModal()" class="flex-1 p-3 border rounded-xl font-bold hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="flex-1 p-3 bg-brand-active text-black rounded-xl font-bold shadow-lg">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNsMs3bW1ocQ9qsWAS_PfF1KC_ghvvYPws0LkS7zvDuoR9FsWow65Rh9bTYLhBhl5fZA/exec";

        let allData = { bookings: [], blockedDates: [], blockedNumbers: [] };

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchData();

            document.getElementById('book-phone').addEventListener('input', (e) => {
                const norm = e.target.value.replace(/\D/g, '');
                const warning = document.getElementById('deposit-warning');
                if (allData.blockedNumbers.includes(norm)) warning.classList.remove('hidden');
                else warning.classList.add('hidden');
            });

            document.getElementById('admin-booking-form').addEventListener('submit', onBookingSubmit);
        });

        async function fetchData() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=get_all`);
                const data = await res.json();
                allData = {
                    bookings: data.bookings || [],
                    blockedDates: data.blocked || [],
                    blockedNumbers: data.blockedNumbers || []
                };
                renderDashboard();
                renderBlocks();
                lucide.createIcons();
            } catch (e) {
                console.error("Fetch Error:", e);
            }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active', 'bg-brand-active', 'text-black', 'font-semibold'));
            el.classList.add('active', 'bg-brand-active', 'text-black', 'font-semibold');

            document.getElementById('tab-title').textContent =
                id === 'dashboard' ? 'Dashboard' :
                id === 'blocks' ? 'Bloqueios' :
                id === 'calendar' ? 'Agenda' :
                id === 'finance' ? 'Financeiro' : 'Dashboard';
        }

        function renderDashboard() {
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

            const stats = {
                today: allData.bookings.filter(b => (b["Data Agendamento"] || b.Data || b.date || "") === today).length,
                tomorrow: allData.bookings.filter(b => (b["Data Agendamento"] || b.Data || b.date || "") === tomorrow).length,
                canceled: allData.bookings.filter(b => (b.Status || "") === "Cancelado").length,
                blocked: allData.blockedNumbers.length
            };

            document.getElementById('stat-today').innerText = stats.today;
            document.getElementById('stat-tomorrow').innerText = stats.tomorrow;
            document.getElementById('stat-canceled').innerText = stats.canceled;
            document.getElementById('stat-blocked-nums').innerText = stats.blocked;

            const tbody = document.getElementById('recent-bookings');
            tbody.innerHTML = allData.bookings.slice(0, 10).map(b => {
                const date = b["Data Agendamento"] || b.Data || b.date || "";
                const time = b["Hora"] || b.Hora || b.time || "";
                const client = b["Cliente"] || b.Cliente || b.client || "";
                const service = b["Servico"] || b["Serviço"] || b.Servico || b.service || "";
                const price = b["Valor"] || b.Preco || b.price || "";
                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-medium text-sm">${date} <span class="text-gray-400">@ ${time}</span></td>
                        <td class="px-6 py-4 font-bold text-sm text-gray-800">${client}</td>
                        <td class="px-6 py-4 text-xs bg-gray-100 italic rounded inline-block mt-3 ml-6 capitalize font-bold text-gray-500">${service}</td>
                        <td class="px-6 py-4 font-bold text-brand-green">R$ ${price}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="cancelBooking('${date}','${time}')" class="text-brand-red hover:bg-brand-red/10 p-2 rounded-full">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderBlocks() {
            const list = document.getElementById('blocked-phones-list');
            list.innerHTML = allData.blockedNumbers.map(n => `
                <li class="flex justify-between items-center py-3">
                    <span class="font-bold text-gray-700">${n}</span>
                    <button onclick="removeBlockPhone('${n}')" class="text-brand-red font-bold text-xs hover:underline uppercase">Desbloquear</button>
                </li>
            `).join('') || '<li class="py-3 text-sm text-gray-500">Nenhum número bloqueado</li>';

            const dList = document.getElementById('blocked-dates-list');
            dList.innerHTML = allData.blockedDates.map(d => `
                <span class="bg-brand-dark text-white text-xs px-3 py-1 rounded-full flex items-center gap-2">
                    ${d.DataBloqueio || d.Data || d}
                    <button onclick="unblockDate('${d.DataBloqueio || d.Data || d}')">×</button>
                </span>
            `).join('') || '<div class="text-sm text-gray-500">Nenhuma data bloqueada</div>';
        }

        async function postJSON(payload) {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return res.json();
        }

        async function addBlockedPhone() {
            const num = document.getElementById('new-block-phone').value.replace(/\D/g, '');
            if (!num) return;
            await postJSON({ action: 'add_blocked_number', number: num });
            document.getElementById('new-block-phone').value = '';
            fetchData();
        }

        async function removeBlockPhone(num) {
            if (!confirm('Remover este número dos bloqueados?')) return;
            await postJSON({ action: 'remove_blocked_number', number: num });
            fetchData();
        }

        async function blockDateRange() {
            const start = document.getElementById('block-date-start').value;
            const end = document.getElementById('block-date-end').value || start;
            if (!start) return;
            await postJSON({ action: 'block_range', startDate: start, endDate: end });
            fetchData();
        }

        async function unblockDate(date) {
            if (!confirm('Remover bloqueio em ' + date + '?')) return;
            await postJSON({ action: 'unblock_date', date });
            fetchData();
        }

        async function cancelBooking(date, time) {
            if (!confirm('Excluir este agendamento?')) return;
            await postJSON({ action: 'delete_booking', date, time });
            fetchData();
        }

        function openBookingModal() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeBookingModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        async function onBookingSubmit(e) {
            e.preventDefault();
            const client = document.getElementById('book-client').value.trim();
            const phone = document.getElementById('book-phone').value.trim();
            const normPhone = phone.replace(/\D/g, '');
            const date = document.getElementById('book-date').value;
            const time = document.getElementById('book-time').value;
            const serviceData = document.getElementById('book-service').value.split('|');

            const isBlocked = allData.blockedNumbers.includes(normPhone);
            const notes = isBlocked ? "[SINAL 50% EXIGIDO]" : "";

            const payload = {
                type: 'booking',
                client,
                phone,
                service: serviceData[0],
                price: Number(serviceData[1]),
                date,
                time,
                notes,
                paymentMethod: isBlocked ? 'SINAL 50%' : 'No Local'
            };

            const res = await postJSON(payload);
            if (res.status === 'success') {
                closeBookingModal();
                e.target.reset();
                fetchData();
            } else {
                alert(res.message || 'Erro ao salvar agendamento');
            }
        }
    </script>
</body>
</html>
